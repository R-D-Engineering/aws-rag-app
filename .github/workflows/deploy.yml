name: Terraform AWS Deployment

on:
  push:
    branches:
      - main
      - develop
      - staging
  pull_request:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      reset_db_password:
        description: 'Reset database password (use with caution)'
        required: false
        default: false
        type: boolean
      bastion_allowed_cidr:
        description: 'CIDR block allowed to access bastion (e.g. office IP)'
        required: false
        default: '0.0.0.0/0'
        type: string
      wait_for_db:
        description: 'Wait for database to be available before initialization'
        required: false
        default: true
        type: boolean

env:
  TERRAFORM_VERSION: 1.5.7
  PYTHON_VERSION: '3.11'

permissions:
  id-token: write
  contents: read

jobs:
  determine_environment:
    runs-on: ubuntu-latest
    outputs:
      environment:            ${{ steps.set-env.outputs.environment }}
      reset_db_password:      ${{ steps.set-env.outputs.reset_db_password }}
      wait_for_db:            ${{ steps.set-env.outputs.wait_for_db }}
      project_name:           ${{ steps.read-vars.outputs.project_name }}
      aws_region:             ${{ steps.read-vars.outputs.aws_region }}
      bastion_allowed_cidr:   ${{ steps.read-vars.outputs.bastion_allowed_cidr }}
      enable_lifecycle_rules: ${{ steps.read-vars.outputs.enable_lifecycle_rules }}
    steps:
      - uses: actions/checkout@v4

      - id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            BRANCH="${GITHUB_REF##*/}"
            case "$BRANCH" in
              main)    ENV="prod"    ;;
              staging) ENV="staging" ;;
              develop) ENV="dev"     ;;
              *)       ENV="dev"     ;;
            esac
            echo "environment=$ENV" >> $GITHUB_OUTPUT
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.reset_db_password }}" == "true" ]]; then
            echo "reset_db_password=true" >> $GITHUB_OUTPUT
          else
            echo "reset_db_password=false" >> $GITHUB_OUTPUT
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.wait_for_db }}" == "false" ]]; then
            echo "wait_for_db=false" >> $GITHUB_OUTPUT
          else
            echo "wait_for_db=true" >> $GITHUB_OUTPUT
          fi

      - id: read-vars
        run: |
          ENV="${{ steps.set-env.outputs.environment }}"
          echo "Using environment: $ENV"

          if [ -f "environments/$ENV/terraform.tfvars" ]; then
            PROJECT_NAME=$(grep project_name environments/$ENV/terraform.tfvars | cut -d '=' -f2 | tr -d ' "')
            AWS_REGION=$(grep aws_region environments/$ENV/terraform.tfvars | cut -d '=' -f2 | tr -d ' "')
          else
            echo "Warning: terraform.tfvars file not found for environment $ENV"
          fi

          echo "project_name=$PROJECT_NAME"   >> $GITHUB_OUTPUT
          echo "aws_region=$AWS_REGION"       >> $GITHUB_OUTPUT

          if [[ "$ENV" == "prod" ]]; then
            echo "enable_lifecycle_rules=true"  >> $GITHUB_OUTPUT
          else
            echo "enable_lifecycle_rules=false" >> $GITHUB_OUTPUT
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.bastion_allowed_cidr }}" ]]; then
            echo "bastion_allowed_cidr=${{ github.event.inputs.bastion_allowed_cidr }}" >> $GITHUB_OUTPUT
          else
            echo "bastion_allowed_cidr=0.0.0.0/0" >> $GITHUB_OUTPUT
          fi

  # ---------------------------------------------------------------------------
  # Code quality — non-blocking, runs in parallel with build_lambda
  # ---------------------------------------------------------------------------
  code-quality:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [determine_environment]
    env:
      PROJECT_NAME: ${{ needs.determine_environment.outputs.project_name }}
      AWS_REGION:   ${{ needs.determine_environment.outputs.aws_region }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install tox
        run: pip install tox

      - name: Run tox
        run: tox -e py

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    continue-on-error: true

  # ---------------------------------------------------------------------------
  # Build — package all Lambda ZIPs and upload as an artifact
  # ---------------------------------------------------------------------------
  build_lambda:
    needs: [determine_environment]
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: ${{ needs.determine_environment.outputs.project_name }}
      AWS_REGION:   ${{ needs.determine_environment.outputs.aws_region }}
      STAGE:        ${{ needs.determine_environment.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '${{ env.PYTHON_VERSION }}'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install root dependencies
        run: |
          python -m pip install --upgrade pip
          [ -f requirements.txt ] && pip install -r requirements.txt || true

      - name: Package Lambda functions
        run: |
          mkdir -p lambda_artifacts
          for DIR in document_processor query_processor upload_handler db_init auth_handler; do
            if [ -d "src/$DIR" ]; then
              echo "Packaging $DIR Lambda..."
              cd src/$DIR
              pip install -r requirements.txt -t . --quiet || true
              zip -r ../../lambda_artifacts/$DIR.zip . -x "*.pyc" -x "*/__pycache__/*"
              cd ../..
            else
              echo "Warning: src/$DIR not found, skipping."
            fi
          done

      - name: Upload Lambda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-artifacts
          path: lambda_artifacts/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Plan — bootstrap backend, upload ZIPs to S3, run terraform plan
  # ---------------------------------------------------------------------------
  terraform-plan:
    needs: [determine_environment, build_lambda]
    runs-on: ubuntu-latest
    environment: ${{ needs.determine_environment.outputs.environment }}
    env:
      PROJECT_NAME: ${{ needs.determine_environment.outputs.project_name }}
      STAGE:        ${{ needs.determine_environment.outputs.environment }}
      AWS_REGION:   ${{ needs.determine_environment.outputs.aws_region }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ needs.determine_environment.outputs.aws_region }}

      - name: Bootstrap Terraform State Backend
        run: |
          BUCKET_NAME="${PROJECT_NAME}-terraform-state"
          DYNAMODB_TABLE="${PROJECT_NAME}-${STAGE}-terraform-state-lock"

          echo "Ensuring S3 state bucket exists: $BUCKET_NAME"
          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            LOCATION_FLAG=""
            [[ "$AWS_REGION" != "us-east-1" ]] && \
              LOCATION_FLAG="--create-bucket-configuration LocationConstraint=$AWS_REGION"
            aws s3api create-bucket --bucket "$BUCKET_NAME" --region "$AWS_REGION" $LOCATION_FLAG
          fi
          aws s3api put-bucket-versioning \
            --bucket "$BUCKET_NAME" \
            --versioning-configuration Status=Enabled

          echo "Ensuring DynamoDB lock table exists: $DYNAMODB_TABLE"
          aws dynamodb describe-table --table-name "$DYNAMODB_TABLE" 2>/dev/null || \
            aws dynamodb create-table \
              --table-name "$DYNAMODB_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST

      - name: Create Backend Configuration
        run: |
          cat > environments/$STAGE/backend.tf << EOF
          terraform {
            backend "s3" {
              bucket         = "${PROJECT_NAME}-terraform-state"
              key            = "${STAGE}/terraform.tfstate"
              region         = "${AWS_REGION}"
              dynamodb_table = "${PROJECT_NAME}-${STAGE}-terraform-state-lock"
              encrypt        = true

              skip_credentials_validation = true
              skip_metadata_api_check     = true
              force_path_style            = true
            }
          }
          EOF

      - name: Download Lambda artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-artifacts
          path: lambda_artifacts/

      - name: Upload Lambda ZIP files to S3
        run: |
          LAMBDA_BUCKET="${PROJECT_NAME}-${STAGE}-lambda-code"

          if ! aws s3api head-bucket --bucket "$LAMBDA_BUCKET" 2>/dev/null; then
            LOCATION_FLAG=""
            [[ "$AWS_REGION" != "us-east-1" ]] && \
              LOCATION_FLAG="--create-bucket-configuration LocationConstraint=$AWS_REGION"
            aws s3api create-bucket --bucket "$LAMBDA_BUCKET" --region "$AWS_REGION" $LOCATION_FLAG
          fi

          aws s3 cp lambda_artifacts/ s3://${LAMBDA_BUCKET}/lambda/ --recursive

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: environments/${{ needs.determine_environment.outputs.environment }}
        run: terraform init

      - name: Import Existing Resources
        working-directory: environments/${{ needs.determine_environment.outputs.environment }}
        run: |
          chmod +x ../../scripts/import_resources.sh
          ../../scripts/import_resources.sh "$PROJECT_NAME" "$STAGE" "$AWS_REGION" || true

      - name: Terraform Plan
        working-directory: environments/${{ needs.determine_environment.outputs.environment }}
        run: |
          terraform plan \
            -lock=false \
            -var="reset_db_password=${{ needs.determine_environment.outputs.reset_db_password }}" \
            -var="enable_lifecycle_rules=${{ needs.determine_environment.outputs.enable_lifecycle_rules }}" \
            -var="bastion_allowed_cidr=[\"${{ needs.determine_environment.outputs.bastion_allowed_cidr }}\"]" \
            -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ needs.determine_environment.outputs.environment }}
          path: environments/${{ needs.determine_environment.outputs.environment }}/tfplan
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Apply — runs only on push/dispatch. Recreates backend.tf before init so
  # that `terraform output` reads from S3 state, not an empty local state.
  # ---------------------------------------------------------------------------
  terraform-apply:
    needs: [determine_environment, build_lambda, terraform-plan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: ${{ needs.determine_environment.outputs.environment }}
    env:
      PROJECT_NAME:      ${{ needs.determine_environment.outputs.project_name }}
      STAGE:             ${{ needs.determine_environment.outputs.environment }}
      AWS_REGION:        ${{ needs.determine_environment.outputs.aws_region }}
      RESET_DB_PASSWORD: ${{ needs.determine_environment.outputs.reset_db_password }}
      WAIT_FOR_DB:       ${{ needs.determine_environment.outputs.wait_for_db }}
    outputs:
      api_endpoint: ${{ steps.extract-outputs.outputs.api_endpoint }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ needs.determine_environment.outputs.aws_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false   # must be false so $(terraform output) captures values, not the binary path

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ needs.determine_environment.outputs.environment }}
          path: environments/${{ needs.determine_environment.outputs.environment }}

      # Each job runs on a fresh runner — backend.tf from terraform-plan is not
      # persisted. Without recreating it here, terraform init uses a local backend
      # and terraform output returns nothing after apply.
      - name: Create Backend Configuration
        run: |
          cat > environments/$STAGE/backend.tf << EOF
          terraform {
            backend "s3" {
              bucket         = "${PROJECT_NAME}-terraform-state"
              key            = "${STAGE}/terraform.tfstate"
              region         = "${AWS_REGION}"
              dynamodb_table = "${PROJECT_NAME}-${STAGE}-terraform-state-lock"
              encrypt        = true

              skip_credentials_validation = true
              skip_metadata_api_check     = true
              force_path_style            = true
            }
          }
          EOF

      - name: Terraform Init
        working-directory: environments/${{ needs.determine_environment.outputs.environment }}
        run: terraform init

      - name: Terraform Apply
        working-directory: environments/${{ needs.determine_environment.outputs.environment }}
        run: terraform apply -auto-approve tfplan
     
      - name: Wait for VPC endpoints to propagate
        run: |
          echo "Waiting 60s for new VPC Interface endpoints to become available..."
          sleep 60  

      # Separate step so output extraction failures never mask apply errors
      - name: Extract Terraform Outputs
        id: extract-outputs
        working-directory: environments/${{ needs.determine_environment.outputs.environment }}
        run: |
          COGNITO_CLIENT_ID=$(terraform output -raw cognito_app_client_id 2>/dev/null || echo "")
          API_ENDPOINT=$(terraform output -raw api_endpoint 2>/dev/null || echo "")

          echo "COGNITO_CLIENT_ID : $COGNITO_CLIENT_ID"
          echo "API_ENDPOINT      : $API_ENDPOINT"

          # Write env file for the UI artifact
          echo "COGNITO_CLIENT_ID=$COGNITO_CLIENT_ID" > ../../env_vars.env
          echo "API_ENDPOINT=$API_ENDPOINT"           >> ../../env_vars.env

          # Only propagate to GITHUB_OUTPUT when we have a real value
          if [ -n "$API_ENDPOINT" ]; then
            echo "api_endpoint=$API_ENDPOINT" >> $GITHUB_OUTPUT
          else
            echo "Warning: api_endpoint is empty — integration tests will be skipped."
          fi

      - name: Upload UI Env File as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-env-vars
          path: env_vars.env

      - name: Wait for RDS to be available
        if: ${{ needs.determine_environment.outputs.wait_for_db == 'true' }}
        run: |
          DB_INSTANCE_ID="${PROJECT_NAME}-${STAGE}-postgres"
          MAX_ATTEMPTS=60
          ATTEMPT=1

          echo "Waiting for RDS instance $DB_INSTANCE_ID to become available..."
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            STATUS=$(aws rds describe-db-instances \
              --db-instance-identifier "$DB_INSTANCE_ID" \
              --region "$AWS_REGION" \
              --query "DBInstances[0].DBInstanceStatus" \
              --output text 2>/dev/null || echo "not-found")

            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: status = $STATUS"

            if [ "$STATUS" = "available" ]; then
              echo "RDS instance is available."
              break
            fi

            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              echo "Warning: timed out waiting for RDS. Proceeding anyway."
              break
            fi

            ATTEMPT=$((ATTEMPT + 1))
            sleep 10
          done

      - name: Update Lambda env vars after DB password reset
        if: ${{ needs.determine_environment.outputs.reset_db_password == 'true' }}
        run: |
          cd environments/$STAGE
          DB_SECRET_ARN=$(terraform output -raw db_credentials_secret_arn 2>/dev/null || echo "")
          cd ../..

          if [ -z "$DB_SECRET_ARN" ]; then
            echo "DB secret ARN not found — skipping Lambda env updates."
            exit 0
          fi

          echo "Updating Lambda functions with new DB_SECRET_ARN..."
          FUNCTIONS=(
            "${PROJECT_NAME}-${STAGE}-document-processor"
            "${PROJECT_NAME}-${STAGE}-query-processor"
            "${PROJECT_NAME}-${STAGE}-upload-handler"
            "${PROJECT_NAME}-${STAGE}-db-init"
          )

          for FN in "${FUNCTIONS[@]}"; do
            echo "  Checking $FN..."
            ENV_VARS=$(aws lambda get-function-configuration \
              --function-name "$FN" \
              --query "Environment.Variables" \
              --output json 2>/dev/null || echo "{}")

            if echo "$ENV_VARS" | grep -q "DB_SECRET_ARN"; then
              aws lambda update-function-configuration \
                --function-name "$FN" \
                --environment "Variables={DB_SECRET_ARN=$DB_SECRET_ARN}"
              echo "  Updated DB_SECRET_ARN for $FN"
            else
              echo "  $FN does not use DB_SECRET_ARN, skipping."
            fi
          done

      # db_init and auth_handler are fully managed by Terraform (modules/compute/main.tf).
      # terraform apply above already deployed the latest code from S3 for all five
      # Lambda functions. No separate update-function-code step is needed.

      - name: Invoke Database Init Lambda
        run: |
          DB_INIT_NAME="${PROJECT_NAME}-${STAGE}-db-init"
          echo "Waiting for $DB_INIT_NAME to finish updating..."
          aws lambda wait function-updated --function-name "$DB_INIT_NAME" 2>/dev/null || true

          echo "Invoking DB init Lambda asynchronously..."
          aws lambda invoke \
            --function-name "$DB_INIT_NAME" \
            --invocation-type Event \
            --payload '{}' \
            --cli-binary-format raw-in-base64-out \
            /dev/null

          echo "DB init Lambda invoked. It runs asynchronously — check CloudWatch logs for results."
          echo "Log group: /aws/lambda/$DB_INIT_NAME"


         

      - name: Verify deployment
        run: |
          UPLOAD_HANDLER="${PROJECT_NAME}-${STAGE}-upload-handler"
          echo "Verifying deployment via $UPLOAD_HANDLER healthcheck..."
          aws lambda invoke \
            --function-name "$UPLOAD_HANDLER" \
            --payload '{"action":"healthcheck"}' \
            --cli-binary-format raw-in-base64-out \
            response.json || echo "Healthcheck invocation failed — deployment may still be healthy."
          cat response.json || true

  # ---------------------------------------------------------------------------
  # Integration tests — skipped automatically when API endpoint is unavailable
  # ---------------------------------------------------------------------------
  integration_tests:
    needs: [determine_environment, terraform-apply]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: ${{ needs.determine_environment.outputs.environment }}
    env:
      PROJECT_NAME: ${{ needs.determine_environment.outputs.project_name }}
      STAGE:        ${{ needs.determine_environment.outputs.environment }}
      AWS_REGION:   ${{ needs.determine_environment.outputs.aws_region }}
      API_ENDPOINT: ${{ needs.terraform-apply.outputs.api_endpoint }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ needs.determine_environment.outputs.aws_region }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '${{ env.PYTHON_VERSION }}'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          [ -f requirements.txt ]     && pip install -r requirements.txt     || true
          [ -f requirements-dev.txt ] && pip install -r requirements-dev.txt || true

      - name: Stash root pytest config files
        run: |
          # Prevent root-level pytest config from interfering with integration tests
          for FILE in pytest.ini pyproject.toml .coveragerc conftest.py src/conftest.py; do
            if [ -f "$FILE" ]; then
              echo "Stashing $FILE"
              mv "$FILE" "${FILE}.bak"
            fi
          done

      - name: Run integration tests
        run: |
          echo "API endpoint: $API_ENDPOINT"
          if [ -z "$API_ENDPOINT" ] || [ "$API_ENDPOINT" == "https://example.com" ]; then
            echo "No valid API endpoint — skipping integration tests."
            echo "<testsuites><testsuite name='placeholder'><testcase name='placeholder'><skipped message='API endpoint not available'/></testcase></testsuite></testsuites>" \
              > integration-test-results.xml
          else
            python src/tests/integration/run_integration_tests.py
          fi

      - name: Restore pytest config files
        if: always()
        run: |
          for FILE in pytest.ini pyproject.toml .coveragerc conftest.py src/conftest.py; do
            if [ -f "${FILE}.bak" ]; then
              echo "Restoring $FILE"
              mv "${FILE}.bak" "$FILE"
            fi
          done

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: integration-test-results.xml
