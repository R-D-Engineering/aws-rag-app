[tox]
envlist = py311
isolated_build = True

[testenv]
deps =
    pytest>=8.3.5
    pytest-cov>=6.1.1
    # AWS / DB runtime deps
    boto3>=1.38.6
    psycopg2-binary>=2.9.10
    moto>=5.1.4
    # query_processor runtime dep — httpx is imported at module level
    httpx>=0.27.0
skip_install = true
setenv =
    PYTHONPATH = {toxinidir}/src
commands =
    pytest src/tests/unit --cov=src --cov-report=xml --cov-config=tox.ini --cov-branch

[coverage:run]
source = src
omit = src/tests/*, */__init__.py
branch = True

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass
    raise ImportError